name: Build and Push Images

on:
  push:
    tags:
      - 'v*' # Startet den Build nur bei Tags wie v1.0, v1.1 etc.

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build & Push Backend
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          build-args: |
            VITE_API_URL=http://192.168.178.45:8000/api/v1
          tags: |
            ghcr.io/sinnaj004/portfolio-backend:latest
            ghcr.io/sinnaj004/portfolio-backend:${{ github.ref_name }}

      # Build & Push Frontend (hier wird das Multi-Stage Dockerfile genutzt)
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./portfolio-frontend
          push: true
          tags: |
            ghcr.io/sinnaj004/portfolio-frontend:latest
            ghcr.io/sinnaj004/portfolio-frontend:${{ github.ref_name }}
