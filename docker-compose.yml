services:
  # --- Datenbank: TimescaleDB ---
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: portfolio_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - portfolio_network

  # --- Cache: Redis ---
  redis:
    image: redis:alpine
    container_name: portfolio_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - portfolio_network

  # --- Backend: FastAPI ---
  backend:
    build: ./backend
    container_name: portfolio_backend
    restart: always
    # --- NEU: DNS-Server hinzufügen ---
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - portfolio_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --- Frontend: React (Vite) ---
  frontend:
    build: ./portfolio-frontend
    container_name: portfolio_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./portfolio-frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://192.168.178.42:8000/api/v1
    depends_on:
      - backend
    networks:
      - portfolio_network
    command: npm run dev -- --host 0.0.0.0

# --- NEU: Explizite Netzwerk-Definition ---
networks:
  portfolio_network:
    driver: bridge

volumes:
  db_data: