version: '3.8'

services:
  # --- Datenbank: TimescaleDB ---
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: portfolio_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - portfolio_network

  # --- Cache: Redis ---
  redis:
    image: redis:alpine
    container_name: portfolio_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - portfolio_network

  # --- Backend: FastAPI ---
  backend:
    build:
      context: ./backend
    container_name: portfolio_backend
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - db
      - redis
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - portfolio_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --- Frontend: React (Vite) ---
  frontend:
    build:
      context: ./portfolio-frontend
      target: development
    container_name: portfolio_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./portfolio-frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://192.168.178.42:8000/api/v1
    depends_on:
      - backend
    networks:
      - portfolio_network
    command: npm run dev -- --host 0.0.0.0

  # --- pgAdmin: DB Verwaltung ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: portfolio_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - portfolio_network

networks:
  portfolio_network:
    driver: bridge

volumes:
  db_data: