version: '3.8'

services:
  # --- Datenbank: TimescaleDB ---
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: portfolio_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Neuer persistenter Pfad auf deinem Homeserver / in der VM
      - /opt/docker/portfolio_tracker/db_data:/var/lib/postgresql/data
    networks:
      - portfolio_network

  # --- Cache: Redis ---
  redis:
    image: redis:alpine
    container_name: portfolio_redis
    restart: unless-stopped # Hinzugefügt, damit Redis nach VM-Neustart mit hochfährt
    networks:
      - portfolio_network

  # --- Backend: FastAPI ---
  backend:
    image: ghcr.io/${GITHUB_USER}/portfolio-backend:latest
    container_name: portfolio_backend
    restart: unless-stopped
    depends_on:
      - db
      - redis
    # Angepasst an den neuen zentralen Ordner in der VM
    env_file:
      - /opt/docker/portfolio_tracker/.env
    ports:
      - "8000:8000"
    networks:
      - portfolio_network

  # --- Frontend: Nginx (React/Vite static build) ---
  frontend:
    image: ghcr.io/${GITHUB_USER}/portfolio-frontend:latest
    container_name: portfolio_frontend
    restart: unless-stopped
    ports:
      - "3000:80" # Port 3000 deines Homeservers leitet auf das Frontend weiter
    depends_on:
      - backend
    networks:
      - portfolio_network

networks:
  portfolio_network:
    driver: bridge